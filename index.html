<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقع يولوس - متوقف</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 4em;
      margin: 0.2em 0;
      color: #ff4d4d;
    }

    p {
      font-size: 1.5em;
      margin: 0.2em 0 1em 0;
      color: #ddd;
    }

    .rules {
      background-color: #333;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
      text-align: right;
      line-height: 1.6;
    }

    .rules h2 {
      color: #ffcc00;
      margin-bottom: 10px;
    }

    .rules ul {
      list-style-type: disc;
      padding-right: 20px;
    }

    .rules li {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>مقاطعة يولوس</h1>
  <p>تم ايقاف لموقع بسبب اشياء خاصة بين فريق التطوير و مسؤولين السيرفر</p>

</body>
</html>
